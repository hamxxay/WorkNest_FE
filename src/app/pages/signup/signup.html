<section class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
      <span>WorkNest</span>
    </div>
    <h1>Create Account</h1>
    <p class="auth-sub">Sign up to start booking workspaces</p>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }
    @if (success()) {
      <div class="alert alert-success">{{ success() }}</div>
    }

    <div class="social-auth">
      <button
        type="button"
        class="social-btn"
        [disabled]="loading() || socialLoading() !== null"
        (click)="signUpWithGoogle()">
        <span class="social-icon social-google">G</span>
        {{ socialLoading() === 'google' ? 'Connecting Google...' : 'Continue with Google' }}
      </button>
      <button
        type="button"
        class="social-btn"
        [disabled]="loading() || socialLoading() !== null"
        (click)="signUpWithGithub()">
        <span class="social-icon social-github">GH</span>
        {{ socialLoading() === 'github' ? 'Connecting GitHub...' : 'Continue with GitHub' }}
      </button>
    </div>

    <div class="auth-divider"><span>or</span></div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" placeholder="Enter your full name" [(ngModel)]="fullName" name="fullName" required />
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="Enter your email" [(ngModel)]="email" name="email" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-password">
          <input [type]="showPassword ? 'text' : 'password'" class="form-input" placeholder="Create a password" [(ngModel)]="password" name="password" required />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-password">
          <input [type]="showConfirm ? 'text' : 'password'" class="form-input" placeholder="Confirm your password" [(ngModel)]="confirmPassword" name="confirmPassword" required />
          <button type="button" class="toggle-pw" (click)="showConfirm = !showConfirm">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg submit-btn" [disabled]="loading() || socialLoading() !== null">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
        {{ loading() ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <p class="auth-footer">
      Already have an account? <a routerLink="/login">Sign in</a>
    </p>
  </div>
</section>
