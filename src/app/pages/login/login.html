<section class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/><path d="M15 3v18"/></svg>
      <span>WorkNest</span>
    </div>
    <h1>Welcome Back</h1>
    <p class="auth-sub">Sign in to your account to continue</p>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="Enter your email" [(ngModel)]="email" name="email" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-password">
          <input [type]="showPassword ? 'text' : 'password'" class="form-input" placeholder="Enter your password" [(ngModel)]="password" name="password" required />
          <button type="button" class="toggle-pw" (click)="showPassword = !showPassword">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-extras">
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg submit-btn" [disabled]="loading()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/></svg>
        {{ loading() ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a routerLink="/signup">Sign up</a>
    </p>
  </div>
</section>
